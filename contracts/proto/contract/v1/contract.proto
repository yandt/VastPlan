syntax = "proto3";

// 不可变契约（Immutable Contracts）
// 单一真源：CallContext / CallTarget / CallResult / CallEvent
// 规格见 docs/dev/architecture/插件契约与协议.md 第三章
package vastplan.contract.v1;

option go_package = "cdsoft.com.cn/VastPlan/core/shared/go/contract/v1;contractv1";

// ── 身份与调用方 ───────────────────────────────────────────

// 统一身份（第三章 §3.6）
message Principal {
  string user_id = 1;
  string username = 2;
  bool is_admin = 3;
  string tenant_id = 4;
  repeated string system_roles = 5;
  map<string, RoleList> project_roles = 6; // {project_id: [role_id...]}
  optional string session_id = 7;
}

message RoleList {
  repeated string roles = 1;
}

// 调用方种类（第三章 §3.5，CallerKind 登记）
enum CallerKind {
  CALLER_KIND_UNSPECIFIED = 0;
  CALLER_KIND_USER = 1;
  CALLER_KIND_AGENT = 2;
  CALLER_KIND_PLUGIN = 3;
  CALLER_KIND_SYSTEM = 4;
  CALLER_KIND_RUNNER = 5;
}

message Caller {
  CallerKind kind = 1;
  string id = 2;
}

// 链路追踪
message Trace {
  string trace_id = 1;
  string span_id = 2;
  optional string parent_span_id = 3;
}

// 凭证句柄——只带名字与范围，不带值（第三章 §3.7）
message CredentialRef {
  string name = 1;
  optional string scope = 2;
}

// ── 四个核心契约 ───────────────────────────────────────────

// 调用上下文（第三章 §3.2）——随每次调用透传
message CallContext {
  Principal principal = 1;
  Caller caller = 2;
  string scene = 3; // 三元组之 scene，如 agent.tool_call / frontend.api / runner.exec
  string tenant_id = 4;
  optional string project_id = 5;
  Trace trace = 6;
  optional int64 deadline_unix_ms = 7;
  repeated CredentialRef credentials = 8; // 句柄，非明文
  optional string idempotency_key = 9;
  map<string, string> metadata = 10;
  // 宿主维护的能力调用路径。SDK 必须原样继承，宿主只追加并据此拒绝调用环。
  repeated string call_path = 11;
}

// 调用目标（第三章 §3.3）——调哪个扩展点·能力·操作
message CallTarget {
  string extension_point = 1; // 如 tool.package
  string capability = 2;      // 贡献稳定逻辑名（= 清单 id），跨内核寻址亦用它
  optional string version = 3;
  optional string operation = 4; // 子命令
  optional string payload_schema = 5;
  optional string logical_service = 6; // 目标服务副本组的逻辑身份
  optional string routing_domain = 7; // 同 capability 下隔离 queue/leader/shard 路由域
  optional string partition_key = 8; // partitioned 服务选择 owner 的稳定分片键
  optional string instance_id = 9; // 有状态短会话精确路由到已发布的健康实例
}

// 错误（应用层，与传输层错误严格区分）
message Error {
  string code = 1; // 命名空间化，如 permission.denied
  string message = 2;
  bool retryable = 3;
  map<string, string> details = 4;
}

// 计量
message Usage {
  int64 duration_ms = 1;
  optional int64 tokens = 2;
  optional double cost = 3;
  map<string, string> custom = 4;
}

// 调用结果（第三章 §3.4）
message CallResult {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_OK = 1;
    STATUS_ERROR = 2;
    STATUS_PARTIAL = 3;
  }
  Status status = 1;
  optional Error error = 2;
  optional Usage usage = 3;
  repeated string warnings = 4;
  map<string, string> metadata = 5;
}

// 事件（第三章 §3.8）
message CallEvent {
  string id = 1;
  string type = 2;   // 命名空间化，如 task.completed
  string source = 3; // 服务/插件 id
  optional string subject = 4;
  int64 occurred_at_unix_ms = 5;
  string tenant_id = 6;
  optional Trace trace = 7;
  optional string principal_ref = 8;
  bytes payload = 9;
}
