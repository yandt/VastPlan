name: Backend Kernel Soak

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 稳定负载时长（发布候选必须为 24h）
        required: true
        default: 24h

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 1500
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Backend Kernel soak
        env:
          VASTPLAN_SOAK_DURATION: ${{ inputs.duration }}
          VASTPLAN_SOAK_REPORT: ${{ runner.temp }}/backend-soak.json
          VASTPLAN_SOAK_REQUIRE_FD: "true"
          VASTPLAN_SOAK_COMMIT: ${{ github.sha }}
        run: go test -tags='e2e soak' -run='^TestBackendKernelSoak$' -timeout=25h -v ./engineering/e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: backend-kernel-soak-report
          path: ${{ runner.temp }}/backend-soak.json
          if-no-files-found: error
