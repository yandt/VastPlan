name: Backend Kernel Release

on:
  push:
    tags: ['backend-v*']

permissions:
  contents: read

jobs:
  verify:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with: {fetch-depth: 0}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with: {go-version-file: go.mod}
      - name: 校验发布提交与 soak 证据
        env:
          GH_TOKEN: '${{ github.token }}'
        run: |
          version="$(tr -d '[:space:]' < kernels/backend/VERSION)"
          test "$GITHUB_REF_NAME" = "backend-v${version}"
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

          test -s kernels/backend/SOAKED_COMMIT
          soaked_commit="$(git rev-parse "$(tr -d '[:space:]' < kernels/backend/SOAKED_COMMIT)^{commit}")"
          git merge-base --is-ancestor "$soaked_commit" "$GITHUB_SHA"
          while IFS= read -r changed; do
            case "$changed" in
              CHANGELOG.md|kernels/backend/VERSION|kernels/backend/SOAKED_COMMIT|docs/dev/guides/Backend内核1.0封板.md) ;;
              *) echo "soak 后出现非推广改动: $changed" >&2; exit 1 ;;
            esac
          done < <(git diff --name-only "$soaked_commit" "$GITHUB_SHA")

          valid_run=""
          while IFS= read -r run_id; do
            test -n "$run_id" || continue
            rm -rf soak-report
            if gh run download "$run_id" --name backend-kernel-soak-report --dir soak-report && \
               go run ./tools/soakreport -file soak-report/backend-soak.json -minimum 24h -commit "$soaked_commit"; then
              valid_run="$run_id"
              break
            fi
          done < <(gh run list --workflow soak.yml --commit "$soaked_commit" --status success --limit 100 --json databaseId --jq '.[].databaseId')
          test -n "$valid_run" || { echo "未找到被测提交的合格 24h soak 报告" >&2; exit 1; }
          echo "使用 soak run: $valid_run"
      - run: ./tools/verify-release.sh

  build:
    needs: verify
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm64}
          - {goos: darwin, goarch: amd64}
          - {goos: darwin, goarch: arm64}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with: {go-version-file: go.mod}
      - name: 校验 tag 与 VERSION
        run: test "${GITHUB_REF_NAME}" = "backend-v$(tr -d '[:space:]' < kernels/backend/VERSION)"
      - name: 构建
        env: {TARGET_GOOS: '${{ matrix.goos }}', TARGET_GOARCH: '${{ matrix.goarch }}'}
        run: |
          mkdir -p dist
          version="$(tr -d '[:space:]' < kernels/backend/VERSION)"
          CGO_ENABLED=0 GOOS="$TARGET_GOOS" GOARCH="$TARGET_GOARCH" \
            go build -trimpath -buildvcs=false -ldflags "-s -w -buildid= -X main.version=${version}" \
            -o "dist/backend-kernel-${TARGET_GOOS}-${TARGET_GOARCH}" ./kernels/backend
          go run ./tools/sbom \
            -binary "dist/backend-kernel-${TARGET_GOOS}-${TARGET_GOARCH}" \
            -output "dist/backend-kernel-${TARGET_GOOS}-${TARGET_GOARCH}.cdx.json" \
            -version "$version"
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: 'dist/backend-kernel-${{ matrix.goos }}-${{ matrix.goarch }}'
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: 'dist/backend-kernel-${{ matrix.goos }}-${{ matrix.goarch }}'
          sbom-path: 'dist/backend-kernel-${{ matrix.goos }}-${{ matrix.goarch }}.cdx.json'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with: {name: 'backend-${{ matrix.goos }}-${{ matrix.goarch }}', path: dist/}
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with: {fetch-depth: 0}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with: {pattern: 'backend-*', merge-multiple: true, path: dist}
      - name: 校验和与 GitHub Release
        env: {GH_TOKEN: '${{ github.token }}'}
        run: |
          cd dist
          sha256sum backend-kernel-* > SHA256SUMS
          gh release create "$GITHUB_REF_NAME" ./* --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
