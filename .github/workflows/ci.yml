# CI 门禁（ADR-0019）。
#
# 把工程规范里标 🤖 的规则变成真正拦得住人的检查——否则 ADR-0019 只是又一条君子协定。
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # 钉死版本：codegen 输出随 protoc/插件版本漂移，不钉住会产生假失败
  PROTOC_VERSION: "25.3"
  PROTOC_GEN_GO_VERSION: "v1.36.11"
  PROTOC_GEN_GO_GRPC_VERSION: "v1.6.2"
  GOVULNCHECK_VERSION: "v1.1.4"
  GO_LICENSES_VERSION: "v2.0.1"
  SHELLCHECK_VERSION: "0.11.0"
  SHELLCHECK_LINUX_X86_64_SHA256: "8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"

jobs:
  lint:
    name: 格式与静态检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod # 单一真源：Go 版本随 go.mod
      - name: ShellCheck（钉版本与官方制品摘要）
        run: |
          archive="/tmp/shellcheck.tar.xz"
          curl -sSLo "$archive" \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_LINUX_X86_64_SHA256}  ${archive}" | sha256sum -c -
          tar -xJf "$archive" -C /tmp
          mapfile -t scripts < <(git ls-files '*.sh')
          "/tmp/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" "${scripts[@]}"
      - name: golangci-lint（含 gofmt/goimports/vet）
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2 # 使用 Go 1.26 构建，必须不低于 go.mod 的目标版本

  test:
    name: 单元测试 + 架构守护
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: 单元测试与架构守护（arch/ 无 build tag，随此步执行）
        run: go test -race ./...

  e2e:
    name: E2E（跨进程真实链路）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: E2E
        run: go test -tags=e2e ./e2e/...

  reliability:
    name: Fuzz smoke + 性能回归
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Schema fuzz smoke
        run: |
          go test -run='^$' -fuzz=FuzzParseManifest -fuzztime=10s ./schemas/plugin/v1
          go test -run='^$' -fuzz=FuzzValidateDescriptor -fuzztime=10s ./schemas/plugin/v1
          go test -run='^$' -fuzz=FuzzParseDeployment -fuzztime=10s ./schemas/deployment/v2
      - name: Backend benchmark
        if: github.event_name == 'push'
        run: ./tools/benchmark.sh
      - name: Backend benchmark base/head 回归
        if: github.event_name == 'pull_request'
        run: ./tools/benchmark.sh --compare '${{ github.event.pull_request.base.sha }}'

  reproducible:
    name: 可复现构建与发布自检
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with: {go-version-file: go.mod}
      - run: ./tools/verify-release.sh

  codegen:
    name: codegen 与 proto 同步
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: 安装 protoc（钉版本）
        run: |
          curl -sSLo /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip -q /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> "$GITHUB_PATH"
      - name: 安装 protoc 插件（钉版本）
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${PROTOC_GEN_GO_VERSION}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${PROTOC_GEN_GO_GRPC_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: 重跑 codegen 后不得有差异
        run: |
          ./tools/gen-proto.sh
          if ! git diff --exit-code -- shared/go; then
            echo "::error::proto 改了但 codegen 生成物未同步提交。请本地跑 ./tools/gen-proto.sh 并提交产物（ADR-0016 §6）"
            exit 1
          fi

  security:
    name: 漏洞与许可证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: 漏洞扫描（只对**可达**漏洞报错）
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          "$(go env GOPATH)/bin/govulncheck" ./...
      - name: 依赖许可证白名单（ADR-0019 §3）
        run: |
          go install github.com/google/go-licenses/v2@${GO_LICENSES_VERSION}
          # --ignore 本仓模块：本规则约束的是**第三方依赖**的许可证
          "$(go env GOPATH)/bin/go-licenses" check ./... \
            --ignore cdsoft.com.cn/VastPlan \
            --allowed_licenses=Apache-2.0,MIT,BSD-3-Clause,BSD-2-Clause,ISC,MPL-2.0
